<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresa Biobio</title>
</head>
<header>
    <h1>Registro colaboradores</h1>
    <nav>

    </nav>
</header>
<body>
    <main>
        <section id="formulario">//nombre, apellido, cargo y correo electronico corporativo
            <form id="form-corportativo" method="post"></form>
            <label id="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required placeholder="">

            <label id="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required placeholder="">

            <label id="cargo">Cargo:</label>
            <select id="cargo" name="cargo">
            <option value="gerente">Gerente</option>
            <option value="secretaria">Secretaria</option>
            <option value="administrador">Administrador</option>
            <option value="trabajador">Trabajador</option>
            </select>

            <label id="correo-corporativo">Correo:</label>
            <input type="text" id="correo-corporativo" name="correo-corporativo" required placeholder="@empresa.cl">

            <button type="submit">Registrar</button>
            <p id="form-error"></p>
        </section>
    </main>
    
</body>
</html>
