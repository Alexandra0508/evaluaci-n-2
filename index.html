<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresa Biobio</title>
    <link rel="stylesheet" href="style.css">
</head>
<header>
    <h1>Registro colaboradores</h1>
    <nav></nav>
</header>

<body>
    <main>
        <section id="formulario">
            <form id="form-corporativo" method="post">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required placeholder="">

                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" required placeholder="">

                <label for="cargo">Cargo:</label>
                <select id="cargo" name="cargo">
                    <option value="gerente">Gerente</option>
                    <option value="secretaria">Secretaria</option>
                    <option value="administrador">Administrador</option>
                    <option value="trabajador">Trabajador</option>
                </select>

                <label for="correo-corporativo">Correo:</label>
                <input type="text" id="correo-corporativo" name="correo-corporativo" required placeholder="@empresa.cl">

                <button type="submit">Registrar</button>
                <p id="form-error"></p> 
            </form>
        </section>

        <section id="filtros">
            <label for="filtros">Filtro de empleado:</label>
            <input type="text" id="buscador" placeholder="Ingresa nombre o cargo del empleado">
            <button type="submit">Buscar</button>
        </section>

        <section id="colaboradores-registrados">
            <h2>Colaboradores registrados</h2>
            <div class="tabla-colaboradores">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Cargo</th>
                            <th>Correo electrónico</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body-colaboradores"></tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <p> 2026 Empresa Biobio S.A Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    
</body>
</html>
